<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marciano Goggia - Intelligence & Engagement</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
if (!sessionStorage.getItem('mg_token')) {
            window.location.href = 'login.html';
        }
        
// Load user info
        const usuario = JSON.parse(sessionStorage.getItem('mg_usuario') || 'null');
        if (usuario) {
            document.getElementById('userName').textContent = usuario.nome;
        }
        
        function logout() {
            sessionStorage.removeItem('mg_token');
            sessionStorage.removeItem('mg_usuario');
            window.location.href = 'login.html';
        }
        
        function logout() {
            localStorage.removeItem('mg_token');
            localStorage.removeItem('mg_usuario');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
