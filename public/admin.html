        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; font-family: 'Inter', sans-serif; background: #0a0e17; color: #fff; font-size: 14px; overflow-x: hidden; }
        
        .navbar { 
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            display: flex; justify-content: space-between; padding: 0.8rem 1.5rem; 
            background: rgba(10, 14, 23, 0.7); backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .logo { font-size: 1.5rem; font-weight: 800; color: #1a1f2e; display: flex; align-items: center; gap: 8px; }
        .logo span { color: #00d4ff; }
        
        .main-container {
            padding-top: 80px;
            max-width: 1400px;
            margin: 0 auto;
            padding: 100px 2rem 2rem 2rem;
        }
        
        .stats-grid { 
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .stat-card { 
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        .stat-card:hover {
            background: rgba(0,212,255,0.05);
            border-color: rgba(0,212,255,0.2);
            transform: translateY(-3px);
        }
        .stat-value { font-size: 2rem; font-weight: 800; color: #00d4ff; text-shadow: 0 0 15px rgba(0,212,255,0.3); }
        .stat-label { font-size: 0.7rem; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 1px; margin-top: 5px; display: block; }
        
        .btn-voltar {
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            padding: 0.6rem 1.2rem;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
        }
        .btn-voltar:hover { 
            background: rgba(255,255,255,0.12); 
            color: #fff; 
            border-color: #00d4ff;
            transform: translateX(-5px);
        }

        .toolbar {
            background: rgba(255,255,255,0.02);
            padding: 1.5rem;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            backdrop-filter: blur(10px);
        }

            position: relative;
            flex: 1;
            max-width: 500px;
        }
        .search-container i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.3);
        }
        .search-container input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: #fff;
            transition: all 0.3s;
        }
        .search-container input:focus {
            border-color: #00d4ff;
            background: rgba(0,0,0,0.4);
            outline: none;
        }
        
        .table-container {
            background: rgba(255,255,255,0.02);
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.05);
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);

            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);

        .modal {

            color: rgba(255,255,255,0.8);

                font-size: 0.9rem;

        async function buscarCoordenadas(rua, numero, bairro) {
            // Usa o endpoint com cache - mais rápido e economiza chamadas de API
            try {
                const response = await fetch(`/api/geocodificar-com-cache?rua=${encodeURIComponent(rua)}&numero=${encodeURIComponent(numero)}&bairro=${encodeURIComponent(bairro)}`);
                const data = await response.json();
                
                if (data) {
                    return {
                        lat: data.lat,
                        lng: data.lng,
                        preciso: data.preciso
                    };
                }
            } catch (error) {
                console.error('Erro ao buscar coordenadas:', error);
            }
            
            // Fallback
            const bairroLower = bairro.toLowerCase().trim();
            if (BAIRROS_COORDS[bairroLower]) {
                const coords = BAIRROS_COORDS[bairroLower];
                return { lat: coords[0], lng: coords[1], preciso: false };
            }
            
            return { lat: SJP_CENTER.lat, lng: SJP_CENTER.lng, preciso: false };
        }
        
        async function carregarDados() {
            lucide.createIcons();
            try {
                const res = await fetch(API_URL + '/apoiadores');
                allData = await res.json();
                atualizarStats();
                renderizarTabela(allData);
            } catch(e) {
                console.error('Erro:', e);
                Alert.error('Erro ao carregar dados');
            }
        }
        
        function atualizarStats() {
            document.getElementById('totalCount').textContent = allData.length;
            const bairros = [...new Set(allData.map(d => d.bairro).filter(Boolean))];
            document.getElementById('bairroCount').textContent = bairros.length;
            const localizados = allData.filter(d => d.latitude && d.longitude).length;
            document.getElementById('countLocalizado').textContent = localizados;
        }
        
        function filtrarDados() {
            const termo = document.getElementById('searchInput').value.toLowerCase();
            
            const filtrado = allData.filter(d => {
                const matchTermo = !termo || 
                    (d.nome && d.nome.toLowerCase().includes(termo)) ||
                    (d.rua && d.rua.toLowerCase().includes(termo)) ||
                    (d.bairro && d.bairro.toLowerCase().includes(termo));
                return matchTermo;
            });
            
            renderizarTabela(filtrado);
            document.getElementById('filteredCount').textContent = `${filtrado.length} registros`;
        }
        
        function renderizarTabela(dados) {
            const tbody = document.getElementById('tableBody');
            
            if (dados.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="empty-state">Nenhum registro encontrado</td></tr>';
                return;
            }
            
            tbody.innerHTML = dados.map(d => `
                <tr>
                    <td>
                        <div style="font-weight:700; color:#00d4ff;">${d.nome || '-'}</div>
                        <div style="font-size:0.75rem; color:rgba(255,255,255,0.4);">ID: #${d.id}</div>
                    </td>
                    <td><span style="color:rgba(255,255,255,0.8);">${d.rua || '-'}, ${d.numero || '-'}</span></td>
                    <td><span style="color:rgba(255,255,255,0.6);">${d.bairro || '-'}</span></td>
                    <td>
                        <div style="font-size:0.85rem;">
                            ${d.telefone ? `<div style="display:flex; align-items:center; gap:5px;"><i data-lucide="phone" style="width:10px; color:#00ff88;"></i> ${d.telefone}</div>` : ''}
                            ${d.email ? `<div style="display:flex; align-items:center; gap:5px;"><i data-lucide="mail" style="width:10px; color:#00d4ff;"></i> ${d.email}</div>` : ''}
                        </div>
                    </td>
                    <td>
                        <div style="display:flex; flex-direction:column; gap:4px;">
                            <span class="badge badge-data">${d.data_cadastro || '-'}</span>
                            ${d.latitude && d.longitude ? `<span style="font-size:0.7rem; color:#00ff88; display:flex; align-items:center; gap:4px;"><i data-lucide="map-pin" style="width:10px;"></i> Localizado</span>` : '<span style="font-size:0.7rem; color:#ffc107; display:flex; align-items:center; gap:4px;"><i data-lucide="alert-circle" style="width:10px;"></i> Estimado</span>'}
                        </div>
                    </td>
                    <td>
                        <div class="action-btns">
                            <button class="btn-icon btn-edit" onclick="editarRegistro(${d.id})" title="Editar"><i data-lucide="edit-3" style="width:14px;"></i></button>
                            <button class="btn-icon btn-delete" onclick="excluirRegistro(${d.id})" title="Excluir"><i data-lucide="trash-2" style="width:14px;"></i></button>
                        </div>
                    </td>
                </tr>
            `).join('');
            lucide.createIcons();
        }
        
        let pickerMap, pickerMarker;
        function initPickerMap() {
            if (!pickerMap) {
                pickerMap = L.map('picker-map').setView([SJP_CENTER.lat, SJP_CENTER.lng], 13);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '&copy; OpenStreetMap'
                }).addTo(pickerMap);
                
                pickerMarker = L.marker([SJP_CENTER.lat, SJP_CENTER.lng], { draggable: true }).addTo(pickerMap);
                
                pickerMarker.on('dragend', function(e) {
                    const pos = pickerMarker.getLatLng();
                    document.getElementById('latitude').value = pos.lat;
                    document.getElementById('longitude').value = pos.lng;
                    document.getElementById('coordenadas_precisas').value = 'true';
                });
            }
        }
        
        async function buscarNoMapaLocal() {
            const rua = document.getElementById('rua').value;
            const num = document.getElementById('numero').value;
            const bairro = document.getElementById('bairro').value;
            
            if (!rua || !bairro) {
                Alert.warning('Preencha a Rua e o Bairro primeiro.');
                return;
            }
            
            Alert.success('Buscando...');
            const res = await buscarCoordenadas(rua, num, bairro);
            if (res && res.lat) {
                document.getElementById('latitude').value = res.lat;
                document.getElementById('longitude').value = res.lng;
                document.getElementById('coordenadas_precisas').value = res.preciso ? 'true' : 'false';
                
                if (pickerMap) {
                    pickerMap.setView([res.lat, res.lng], 16);
                    pickerMarker.setLatLng([res.lat, res.lng]);
                }
            }
        }

        function abrirModalCadastro() {
            editando = false;
            document.getElementById('modalTitle').textContent = 'Novo Apoiador';
            document.getElementById('btnSubmit').textContent = 'Cadastrar';
            document.getElementById('cadastroForm').reset();
            document.getElementById('editId').value = '';
            document.getElementById('latitude').value = '';
            document.getElementById('longitude').value = '';
            document.getElementById('coordenadas_precisas').value = 'false';
            
            document.getElementById('cadastroModal').classList.add('show');
            
            initPickerMap();
            setTimeout(() => {
                pickerMap.invalidateSize();
                pickerMap.setView([SJP_CENTER.lat, SJP_CENTER.lng], 13);
                pickerMarker.setLatLng([SJP_CENTER.lat, SJP_CENTER.lng]);
            }, 300);
            
            document.getElementById('nome').focus();
        }
        
        function fecharModalCadastro() {
            document.getElementById('cadastroModal').classList.remove('show');
        }
        
        function editarRegistro(id) {
            const registro = allData.find(d => d.id === id);
            if (!registro) return;
            
            editando = true;
            document.getElementById('modalTitle').textContent = 'Editar Apoiador';
            document.getElementById('btnSubmit').textContent = 'Atualizar';
            
            document.getElementById('editId').value = registro.id;
            document.getElementById('nome').value = registro.nome || '';
            document.getElementById('rua').value = registro.rua || '';
            document.getElementById('numero').value = registro.numero || '';
            document.getElementById('bairro').value = registro.bairro || '';
            document.getElementById('telefone').value = registro.telefone || '';
            document.getElementById('email').value = registro.email || '';
            
            document.getElementById('latitude').value = registro.latitude || '';
            document.getElementById('longitude').value = registro.longitude || '';
            document.getElementById('coordenadas_precisas').value = registro.coordenadas_precisas ? 'true' : 'false';
            
            document.getElementById('cadastroModal').classList.add('show');
            
            initPickerMap();
            setTimeout(() => {
                pickerMap.invalidateSize();
                if (registro.latitude && registro.longitude) {
                    pickerMap.setView([registro.latitude, registro.longitude], 16);
                    pickerMarker.setLatLng([registro.latitude, registro.longitude]);
                } else {
                    pickerMap.setView([SJP_CENTER.lat, SJP_CENTER.lng], 13);
                    pickerMarker.setLatLng([SJP_CENTER.lat, SJP_CENTER.lng]);
                }
            }, 300);
            
            document.getElementById('nome').focus();
        }
        
        async function excluirRegistro(id) {
            const confirmado = await Alert.confirm('Tem certeza que deseja excluir este cadastro?');
            if (!confirmado) return;
            
            try {
                await fetch(API_URL + '/apoiadores/' + id, { method: 'DELETE' });
                Alert.success('Cadastro excluído com sucesso!');
                carregarDados();
            } catch(e) {
                Alert.error('Erro ao excluir');
            }
        }
        
        document.getElementById('cadastroForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const nome = document.getElementById('nome').value;
            const rua = document.getElementById('rua').value;
            const numero = document.getElementById('numero').value;
            const bairro = document.getElementById('bairro').value;
            const telefone = document.getElementById('telefone').value;
            const email = document.getElementById('email').value;
            const id = document.getElementById('editId').value;
            
            // Mostrar loading
            const btnSubmit = document.getElementById('btnSubmit');
            const originalText = btnSubmit.textContent;
            btnSubmit.textContent = 'Buscando coordenadas...';
            btnSubmit.disabled = true;
            
            try {
                const manualLat = document.getElementById('latitude').value;
                const manualLng = document.getElementById('longitude').value;
                const manualPrecisas = document.getElementById('coordenadas_precisas').value;
                
                let finalLat, finalLng, finalPreciso;
                
                if (manualLat && manualLng) {
                    finalLat = manualLat;
                    finalLng = manualLng;
                    finalPreciso = manualPrecisas === 'true' ? 1 : 0;
                } else {
                    // Buscar coordenadas automaticamente se não houver no mapa
                    const coords = await buscarCoordenadas(rua, numero, bairro);
                    finalLat = coords.lat;
                    finalLng = coords.lng;
                    finalPreciso = coords.preciso !== false ? 1 : 0;
                }
                
                const dados = {
                    nome: nome,
                    rua: rua,
                    numero: numero,
                    bairro: bairro,
                    telefone: telefone,
                    email: email,
                    latitude: parseFloat(finalLat),
                    longitude: parseFloat(finalLng),
                    coordenadas_precisas: finalPreciso
                };
                
                if (id) {
                    await fetch(API_URL + '/apoiadores/' + id, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(dados)
                    });
                    Alert.success('Cadastro atualizado com sucesso!');
                } else {
                    await fetch(API_URL + '/apoiadores', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(dados)
                    });
                    Alert.success('Novo cadastro realizado com sucesso!');
                }
                
                fecharModalCadastro();
                carregarDados();
                
                // Notificar outras abas para atualizarem apenas o registro específico
                const dadosAtualizados = {
                    id: id || 'novo',
                    action: id ? 'edit' : 'create',
                    timestamp: Date.now()
                };
                localStorage.setItem('apoiador_changed', JSON.stringify(dadosAtualizados));
            } catch(e) {
                console.error('Erro:', e);
                Alert.error('Erro ao salvar');
            } finally {
                btnSubmit.textContent = originalText;
                btnSubmit.disabled = false;
            }
        });
        
        function exportarCSV() {
            if (allData.length === 0) {
                Alert.warning('Nenhum dado para exportar');
                return;
            }
            
            const csv = 'Nome,Rua,Numero,Bairro,Telefone,Email,Data Cadastro,Hora Cadastro\n' + 
                allData.map(d => 
                    `"${d.nome || ''}","${d.rua || ''}","${d.numero || ''}","${d.bairro || ''}","${d.telefone || ''}","${d.email || ''}","${d.data_cadastro || ''}","${d.hora_cadastro || ''}"`
                ).join('\n');
            
            const blob = new Blob([csv], { type: 'text/csv' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'apoiadores.csv';
            a.click();
            Alert.success('Exportação concluída!');
        }
        
        // Fechar modal ao clicar fora
        document.getElementById('cadastroModal').addEventListener('click', function(e) {
            if (e.target === this) {
                fecharModalCadastro();
            }
        });
        
        document.addEventListener('DOMContentLoaded', carregarDados);
    </script>
</body>
</html>
