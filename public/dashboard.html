<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Marciano Goggia</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css">
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; font-family: 'Inter', sans-serif; background: #0a0e17; color: #fff; font-size: 12px; }
        
        @keyframes pulsante {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .marker-pulsante {
            animation: pulsante 1s infinite;
        }
        
        .navbar { 
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            display: flex; justify-content: space-between; padding: 0.5rem 1rem; 
            background: rgba(0,0,0,0.7); backdrop-filter: blur(10px);
        }
        .logo { font-size: 1.8rem; font-weight: 800; color: #00d4ff; letter-spacing: 0.02em; }
        .btn-voltar {
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            padding: 0.6rem 1.2rem;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
        }
        .btn-voltar:hover { 
            background: rgba(255,255,255,0.12); 
            color: #fff; 
            border-color: #00d4ff;
            transform: translateX(-5px);
        }
        .nav { display: none; }
        .nav a { color: #fff; text-decoration: none; padding: 0.3rem 0.7rem; border-radius: 6px; font-size: 0.75rem; }
        .nav a.active { background: rgba(0,212,255,0.2); color: #00d4ff; }
        
        .top-bar { 
            position: fixed; top: 42px; left: 0; right: 0; z-index: 999;
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0.5rem 1rem; gap: 1rem;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);
        }
        .top-bar h1 { font-size: 1rem; }
        .top-bar h1 span { color: #00d4ff; }
        .filters { display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .filters input, .filters select { 
            padding: 0.3rem 0.5rem; border-radius: 4px; 
            border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.5); color: #fff; font-size: 0.7rem; 
        }
        .filters label { font-size: 0.6rem; color: rgba(255,255,255,0.5); margin-right: 0.3rem; }
        
        .stats-grid { 
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 15px;
        }
        .stat-card { 
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .stat-card:hover {
            background: rgba(0,212,255,0.05);
            border-color: rgba(0,212,255,0.2);
            transform: translateY(-2px);
        }
        .stat-value { 
            display: block;
            font-size: 1.6rem;
            font-weight: 800;
            color: #00d4ff;
            text-shadow: 0 0 15px rgba(0,212,255,0.3);
        }
        .stat-label { 
            display: block;
            font-size: 0.6rem;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 4px;
        }
        
        .btn { 
            padding: 0.3rem 0.8rem; border-radius: 4px; border: 1px solid #00d4ff; 
            background: rgba(0,212,255,0.1); color: #00d4ff; cursor: pointer; font-size: 0.7rem; 
        }
        .btn:hover { background: rgba(0,212,255,0.2); }
        
        #map { 
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; 
            z-index: 1;
        }
        
        .charts-overlay {
            position: fixed;
            top: 100px;
            left: 25px;
            width: 380px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 500;
            background: rgba(10, 14, 23, 0.75);
            backdrop-filter: blur(25px);
            padding: 20px;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.08);
            max-height: calc(100vh - 150px);
            overflow-y: auto;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        
        .chart-widget {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 10px;
            transition: all 0.3s ease;
        }
        .chart-widget:hover {
            border-color: rgba(0, 212, 255, 0.3);
            background: rgba(255,255,255,0.05);
        }
        
        #table-body tr { cursor: pointer; transition: background 0.2s; }
        #table-body tr:hover { background: rgba(0, 212, 255, 0.1) !important; }
        
        .marker-glow {
            box-shadow: 0 0 15px #00ff88, 0 0 30px rgba(0,255,136,0.3);
        }
        
        /* Marker Cluster Custom Style */
        .pr-cluster {
            background: rgba(0, 212, 255, 0.2);
            border: 2px solid #00d4ff;
            border-radius: 50%;
            color: #fff;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }
        .chart-widget .widget-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .chart-widget h3 { font-size: 0.8rem; color: #00d4ff; margin-bottom: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .chart-widget .chart-container { height: 280px; }
        
        .leaflet-popup-content-wrapper {
            background: rgba(10, 14, 23, 0.95); 
            color: #fff;
            border-radius: 12px;
            border: 1px solid rgba(0, 212, 255, 0.2);
            backdrop-filter: blur(10px);
        }
        .leaflet-popup-tip { background: rgba(10, 14, 23, 0.95); }

        /* Nova Legenda do Mapa */
        .map-legend {
            background: rgba(10, 14, 23, 0.8);
            padding: 15px;
            border-radius: 16px;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 11px;
            line-height: 1.6;
            box-shadow: 0 8px 32px rgba(0,0,0,0.8);
            pointer-events: auto;
            backdrop-filter: blur(20px);
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
        }
        .legend-color {
            width: 14px;
            height: 14px;
            border-radius: 3px;
        }

        /* Mobile Adjustments for Dashboard */
        @media (max-width: 768px) {
            .charts-overlay {
                width: 90%;
                left: 5%;
                right: 5%;
                top: 100px;
                padding: 15px;
            }
            .stats-grid {
                grid-template-columns: 1fr 1fr;
            }
            .top-bar {
                flex-direction: column;
                align-items: flex-start;
                top: 50px;
            }
            .top-bar .filters {
                margin-top: 10px;
            }
            #map-legend {
                bottom: 10px !important;
                right: 10px !important;
                min-width: 150px !important;
            }
        }
    </style>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <nav class="navbar">
        <div class="logo">Dashboard Métricas</div>
        <a href="index.html" class="btn-voltar">
            <i data-lucide="arrow-left" style="width:16px; height:16px;"></i>
            Voltar
        </a>
    </nav>
    
    <div class="top-bar">
        <div style="display:flex;align-items:center;gap:1rem;flex:1;">
            <h1>Dashboard <span>Popularidade</span></h1>
            <div class="filters">
                <div><label>Buscar</label><input id="fn" oninput="render()" placeholder="Nome"></div>
                <div><label>Bairro</label><select id="fb" onchange="render()"><option value="">Todos</option></select></div>
            </div>
        </div>
        <button class="btn" onclick="exportar()">Exportar CSV</button>
    </div>
    
    <div id="map"></div>
    
    <div class="charts-overlay">
        <div style="color:#fff;padding:10px;text-align:center;" id="loading">Carregando...</div>
        <div class="stats-grid">
            <div class="stat-card">
                <i data-lucide="users" style="width: 14px; height: 14px; color: #00d4ff; margin-bottom: 5px;"></i>
                <span class="stat-value" id="t1">0</span>
                <span class="stat-label">Total</span>
            </div>
            <div class="stat-card">
                <i data-lucide="zap" style="width: 14px; height: 14px; color: #00ff88; margin-bottom: 5px;"></i>
                <span class="stat-value" id="t2">0</span>
                <span class="stat-label">Hoje</span>
            </div>
            <div class="stat-card">
                <i data-lucide="bar-chart-3" style="width: 14px; height: 14px; color: #ffc107; margin-bottom: 5px;"></i>
                <span class="stat-value" id="t3">0</span>
                <span class="stat-label">Média</span>
            </div>
            <div class="stat-card">
                <i data-lucide="map-pin" style="width: 14px; height: 14px; color: #e91e63; margin-bottom: 5px;"></i>
                <span class="stat-value" id="t4">0</span>
                <span class="stat-label">Bairros</span>
            </div>
        </div>
        <div class="chart-widget" id="widget_table">
            <div class="widget-header">
                <h3>Ranking de Engajamento</h3>
            </div>
            <div class="table-responsive" style="max-height: 200px; overflow-y: auto; background: rgba(255,255,255,0.05); border-radius: 8px; padding: 5px;">
                <table style="width: 100%; border-collapse: collapse; font-size: 10px; color: #fff;">
                    <thead style="position: sticky; top: 0; background: #1a1f2e; color: #00d4ff;">
                        <tr>
                            <th style="text-align: left; padding: 5px; border-bottom: 1px solid rgba(255,255,255,0.1);">Bairro</th>
                            <th style="text-align: center; padding: 5px; border-bottom: 1px solid rgba(255,255,255,0.1);">Qtd</th>
                            <th style="text-align: right; padding: 5px; border-bottom: 1px solid rgba(255,255,255,0.1);">%</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
        </div>
        <div class="chart-widget" id="widget2">
            <div class="widget-header">
                <h3>Apoiadores por Dia/Mês</h3>
            </div>
            <div class="chart-container" id="c3"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
    <script src="js/leaflet-heat.js"></script>
    <script src="js/alert.js"></script>
    <script>

        var ch1, ch3;

        var markers = [];
        var heatLayer = null;

        var SJP_CENTER = [-25.5317, -49.2921];

        };

        function createIcon() {
            return L.divIcon({
                className: 'custom-marker',
                html: `<div style="background:#00d4ff;width:24px;height:24px;border-radius:50%;border:3px solid white;box-shadow:0 2px 8px rgba(0,0,0,0.3);"></div>`,
                iconSize: [24, 24],
                iconAnchor: [12, 12]
            });
        }
        
        function init() {
            lucide.createIcons();
            initInternal();
        }

        async function initInternal() {
            try {
                var r = await fetch('/api/apoiadores');
                dados = await r.json();
                document.getElementById('loading').style.display = 'none';
                populate();
                initMap();
                render();
            } catch(e) {
                console.error('Erro:', e);
                document.getElementById('loading').textContent = 'Erro ao carregar';
            }
        }
        
        function populate() {
            var s = document.getElementById('fb');
            var Bairros = {};
            for (var i = 0; i < dados.length; i++) {
                var b = dados[i].bairro;
                if (b) Bairros[b] = true;
            }
            var keys = Object.keys(Bairros).sort();
            for (var j = 0; j < keys.length; j++) {
                var opt = document.createElement('option');
                opt.value = keys[j];
                opt.textContent = keys[j];
                s.appendChild(opt);
            }
        }
        
        function filtrar() {
            var fnEl = document.getElementById('fn');
            var fbEl = document.getElementById('fb');
            var fn = fnEl ? fnEl.value.toLowerCase() : '';
            var fb = fbEl ? fbEl.value : '';
            var result = [];
            for (var i = 0; i < dados.length; i++) {
                var d = dados[i];
                var ok = true;
                if (fn && d.nome && d.nome.toLowerCase().indexOf(fn) === -1) ok = false;
                if (fb && d.bairro !== fb) ok = false;
                if (ok) result.push(d);
            }
            return result;
        }
        
        function initMap() {
            if (map) return;
            
            // Limites aproximados de São José dos Pinhais
            var bounds = [
                [-25.75, -49.50], // Sudoeste
                [-25.35, -49.00]  // Nordeste
            ];

            map = L.map('map', { 
                zoomControl: false,
                maxBounds: bounds,
                maxBoundsViscosity: 1.0
            }).setView(SJP_CENTER, 12);

            // Mapa Escuro Premium
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '© OpenStreetMap contributors © CARTO',
                maxZoom: 18,
                minZoom: 11
            }).addTo(map);
            
            L.control.zoom({ position: 'bottomright' }).addTo(map);
        }
        
        function render() {
            var d = filtrar();
            var t = d.length;
            var bCount = {};
            for (var j = 0; j < d.length; j++) {
                var b = d[j].bairro;
                if (b) bCount[b] = (bCount[b] || 0) + 1;
            }
            document.getElementById('t1').textContent = t;
            
            // Novos Hoje
            var hoje = new Date().toISOString().substring(0, 10);
            var countHoje = d.filter(item => item.data_cadastro === hoje).length;
            document.getElementById('t2').textContent = countHoje;
            
            // Média por Bairro
            var numBairros = Object.keys(bCount).length;
            var media = numBairros > 0 ? (t / numBairros).toFixed(1) : 0;
            document.getElementById('t3').textContent = media;
            
            document.getElementById('t4').textContent = numBairros;
            
            // Popular Tabela
            var tbody = document.getElementById('table-body');
            if (tbody) {
                tbody.innerHTML = '';
                var sortedBairros = Object.keys(bCount).sort((a,b) => bCount[b] - bCount[a]);
                sortedBairros.forEach(b => {
                    var tr = document.createElement('tr');
                    tr.onclick = function() { focarBairro(b); };
                    var pct = t > 0 ? (bCount[b] / t * 100).toFixed(1) : 0;
                    tr.innerHTML = `
                        <td style="padding: 6px; border-bottom: 1px solid rgba(255,255,255,0.05);">${b}</td>
                        <td style="padding: 6px; border-bottom: 1px solid rgba(255,255,255,0.05); text-align: center;">${bCount[b]}</td>
                        <td style="padding: 6px; border-bottom: 1px solid rgba(255,255,255,0.05); text-align: right; color: #00ff88;">${pct}%</td>
                    `;
                    tbody.appendChild(tr);
                });
            }

            
            var dateCount = {};
            for (var dm = 0; dm < dados.length; dm++) {
                var dt = dados[dm].data_cadastro;
                if (dt) {
                    var dateKey = dt.substring(0, 10);
                    dateCount[dateKey] = (dateCount[dateKey] || 0) + 1;
                }
            }
            
            var allDates = Object.keys(dateCount).sort();
            
            var cumulative = 0;
            var cumulativeData = allDates.map(function(k) {
                cumulative += dateCount[k];
                return cumulative;
            });
            
            var movingAvg = [];
            var window = 7;
            for (var i = 0; i < allDates.length; i++) {
                if (i < window - 1) {
                    movingAvg.push(null);
                } else {
                    var sum = 0;
                    for (var j = 0; j < window; j++) {
                        sum += cumulativeData[i - j];
                    }
                    movingAvg.push(Math.round(sum / window));
                }
            }
            
            if (ch3) { ch3.destroy(); ch3 = null; }
            ch3 = new ApexCharts(document.getElementById('c3'), {
                series: [
                    {
                        name: 'Total Acumulado',
                        data: cumulativeData
                    },
                    {
                        name: 'Média Móvel (7 dias)',
                        data: movingAvg
                    }
                ],
                chart: {
                    type: 'line',
                    height: 280,
                    fontFamily: 'Inter, sans-serif',
                    background: 'transparent',
                    toolbar: { show: false },
                    zoom: { enabled: true }
                },
                colors: ['#00ff88', '#00d4ff'],
                stroke: { 
                    curve: 'smooth', 
                    width: [3, 2],
                    dashArray: [0, 5]
                },
                fill: {
                    type: 'solid',
                    opacity: 0.1
                },
                markers: { size: [4, 0] },
                xaxis: {
                    type: 'datetime',
                    categories: allDates,
                    labels: { 
                        style: { colors: '#fff', fontSize: '9px' },
                        datetimeUTC: false
                    },
                    tickAmount: Math.min(allDates.length, 10)
                },
                yaxis: {
                    labels: { style: { colors: '#fff' } }
                },
                grid: { 
                    borderColor: 'rgba(255,255,255,0.1)',
                    strokeDashArray: 4
                },
                legend: {
                    show: true,
                    position: 'top',
                    horizontalAlign: 'left',
                    labels: { colors: '#fff' },
                    fontSize: '10px'
                },
                tooltip: { 
                    theme: 'dark',
                    x: { format: 'dd MMM yyyy' }
                }
            });
            ch3.render();
            
            renderMap(d, media, t);
        }
        
        var markerCluster = null;

        function renderMap(dadosFiltrados, media, total) {
            if (!map) return;
            
            // Limpa camadas anteriores
            markers.forEach(m => map.removeLayer(m));
            markers = [];
            
            if (heatLayer) { map.removeLayer(heatLayer); heatLayer = null; }
            if (markerCluster) { map.removeLayer(markerCluster); markerCluster = null; }
            
            markerCluster = L.markerClusterGroup({
                iconCreateFunction: function(cluster) {
                    return L.divIcon({ 
                        html: '<div class="pr-cluster">' + cluster.getChildCount() + '</div>', 
                        className: 'cluster-icon', 
                        iconSize: [35, 35] 
                    });
                }
            });

            var heatPoints = [];
            var bCount = {};
            dadosFiltrados.forEach(d => { if (d.bairro) bCount[d.bairro] = (bCount[d.bairro] || 0) + 1; });
            
            var maxEngajamento = 0;
            Object.values(bCount).forEach(v => { if (v > maxEngajamento) maxEngajamento = v; });
            if (maxEngajamento === 0) maxEngajamento = 1;

            var sjpBounds = { minLat: -25.75, maxLat: -25.35, minLng: -49.50, maxLng: -49.00 };
            function isInsideSJP(lat, lng) { return lat >= sjpBounds.minLat && lat <= sjpBounds.maxLat && lng >= sjpBounds.minLng && lng <= sjpBounds.maxLng; }

            // 1. Calor por Bairro
            for (var bairroNome in bCount) {
                var coords = BAIRROS_COORDS[bairroNome];
                if (!coords || !isInsideSJP(coords[0], coords[1])) continue;
                var count = bCount[bairroNome];
                var weight = 0.3 + ( (count / maxEngajamento) * 0.7 );
                heatPoints.push([coords[0], coords[1], weight]);
            }

            // 2. Marcadores e Calor Individual
            for (var j = 0; j < dadosFiltrados.length; j++) {
                var apoiador = dadosFiltrados[j];
                var lat, lng;
                if (apoiador.latitude && apoiador.longitude) {
                    lat = parseFloat(apoiador.latitude); lng = parseFloat(apoiador.longitude);
                } else {
                    var c = BAIRROS_COORDS[apoiador.bairro] || SJP_CENTER;
                    lat = c[0]; lng = c[1];
                }
                if (!isInsideSJP(lat, lng)) continue;

                heatPoints.push([lat, lng, 1.0]);
                
                var impreciso = apoiador.coordenadas_precisas === 0;
                var icon = L.divIcon({
                    className: 'custom-marker',
                    html: impreciso 
                        ? '<div class="marker-pulsante" style="background:#ff4444;width:32px;height:32px;border-radius:50%;border:3px solid white;box-shadow:0 0 15px rgba(255,0,0,0.5);display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;font-weight:900;">!</div>'
                        : '<div class="marker-glow" style="background:#00ff88;width:24px;height:24px;border-radius:50%;border:3px solid white;display:flex;align-items:center;justify-content:center;color:#000;font-size:12px;font-weight:bold;">✓</div>',
                    iconSize: impreciso ? [32, 32] : [24, 24],
                    iconAnchor: impreciso ? [16, 16] : [12, 12]
                });
                
                var m = L.marker([lat, lng], {icon: icon});
                m.bindPopup(`
                    <div style="min-width:150px; color:#fff;">
                        <b style="font-size:14px;color:#00d4ff;">${apoiador.nome || '-'}</b><br>
                        <span style="font-size:12px;">${apoiador.rua || '-'}, ${apoiador.numero || 'S/N'} - ${apoiador.bairro || '-'}</span><br>
                        <div style="margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,0.1);font-size:11px;">
                            <b>Engajamento:</b> ${bCount[apoiador.bairro] || 0} pessoas
                        </div>
                    </div>
                `);
                markerCluster.addLayer(m);
                markers.push(m);
            }
            
            map.addLayer(markerCluster);

            if (heatPoints.length > 0) {
                heatLayer = L.heatLayer(heatPoints, {
                    radius: 65, blur: 35, max: 1.0,
                    gradient: { 0.2: '#ff0000', 0.5: '#ffff00', 1.0: '#00ff88' }
                }).addTo(map);
            }

            updateLegend(maxEngajamento, total);
        }

        function focarBairro(nome) {
            var coords = BAIRROS_COORDS[nome];
            if (coords) {
                map.flyTo(coords, 15, { duration: 1.5 });
                // Encontrar e abrir popup de alguém nesse bairro se possível
                var m = markers.find(m => {
                    var pop = m.getPopup().getContent();
                    return pop.includes(nome);
                });
                if (m) setTimeout(() => m.openPopup(), 1600);
            }
        }

        function updateLegend(max, total) {
            var legend = document.getElementById('map-legend');
            if (!legend) {
                legend = document.createElement('div');
                legend.id = 'map-legend';
                legend.className = 'map-legend';
                legend.style.position = 'fixed';
                legend.style.bottom = '30px';
                legend.style.right = '30px';
                legend.style.zIndex = '1000';
                legend.style.minWidth = '220px';
                document.body.appendChild(legend);
            }
            
            legend.innerHTML = `
                <div style="font-weight:800;margin-bottom:12px;color:#00d4ff;text-transform:uppercase;letter-spacing:2px;font-size:10px;display:flex;align-items:center;gap:8px;">
                    <i data-lucide="bar-chart-3" style="width:12px;height:12px;"></i>
                    Engajamento Territorial
                </div>
                <div style="padding: 2px 0;">
                    <div style="height:10px; width:100%; border-radius:5px; background:linear-gradient(to right, #ff0000 0%, #ffff00 50%, #00ff88 100%); border:1px solid rgba(255,255,255,0.1); box-shadow: 0 4px 15px rgba(0,0,0,0.4);"></div>
                    <div style="display:flex; justify-content:space-between; font-size:9px; color:rgba(255,255,255,0.5); margin-top:8px; font-weight:700; text-transform:uppercase;">
                        <span>Baixo</span>
                        <span>Médio</span>
                        <span>Alto</span>
                    </div>
                </div>
                <div style="margin-top:15px;font-size:9px;color:rgba(255,255,255,0.3);border-top:1px solid rgba(255,255,255,0.05);padding-top:10px;display:flex;justify-content:space-between;font-weight:600;">
                    <span>SJP TOTAL: ${total}</span>
                    <span>PICO: ${max}</span>
                </div>
            `;
            if (window.lucide) lucide.createIcons();
        }
        
        function exportar() {
            if (dados.length === 0) { Alert.warning('Sem dados para exportar'); return; }
            var csv = 'Nome,Rua,Numero,Bairro,Telefone,Email,Data Cadastro,Hora Cadastro\n';
            for (var i = 0; i < dados.length; i++) {
                var d = dados[i];
                csv += '"' + d.nome + '","' + (d.rua || '') + '","' + (d.numero || '') + '","' + (d.bairro || '') + '","' + (d.telefone || '') + '","' + (d.email || '') + '","' + (d.data_cadastro || '') + '","' + (d.hora_cadastro || '') + '"\n';
            }
            var blob = new Blob([csv], { type: 'text/csv' });
            var a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'apoiadores.csv';
            a.click();
            Alert.success('Exportação concluída!');
        }
        
        document.addEventListener('DOMContentLoaded', init);
        
        // Escutar mudanças de outras abas
        window.addEventListener('storage', function(e) {
            if (e.key === 'apoiador_changed') {
                var data = JSON.parse(e.newValue);
                
                if (data.action === 'create') {
                    fetch('/api/apoiadores')
                        .then(r => r.json())
                        .then(all => {
                            var novo = all.find(a => !dados.find(o => o.id === a.id));
                            if (novo) {
                                dados.push(novo);
                                populate();
                                render();
                            }
                        });
                } else if (data.action === 'edit') {
                    fetch('/api/apoiadores/' + data.id)
                        .then(r => r.json())
                        .then(atualizado => {
                            if (atualizado) {
                                dados = dados.map(d => d.id === atualizado.id ? atualizado : d);
                                populate();
                                render();
                            }
                        });
                }
                
                localStorage.removeItem('apoiador_changed');
            }
        });
    </script>
</body>
</html>
