<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Apoiadores - Marciano Goggia</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        .navbar { 
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            display: flex; justify-content: space-between; padding: 0.8rem 1.5rem; 
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
        }
        .logo { font-size: 1.3rem; font-weight: 700; color: #00d4ff; }
        .candidate-role { font-size: 0.8rem; color: rgba(255,255,255,0.6); }
        
        .nav-links {
            display: flex;
            gap: 0.5rem;
        }
        
        .nav-links a {
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: all 0.3s;
            font-size: 0.9rem;
        }
        
        .nav-links a:hover, .nav-links a.active {
            background: rgba(0,212,255,0.2);
            color: #00d4ff;
        }
        
        #map {
            height: calc(100vh - 60px);
            width: 100%;
            margin-top: 60px;
        }
        
        .legend {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(0,0,0,0.85);
            padding: 1rem;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .legend h4 {
            color: #fff;
            font-size: 0.9rem;
            margin-bottom: 0.8rem;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
            color: rgba(255,255,255,0.8);
            font-size: 0.85rem;
        }
        
        .legend-icon {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid white;
        }
        
        .custom-marker {
            background: transparent;
            border: none;
        }
        
        .leaflet-popup-content-wrapper {
            background: #1a1f2e;
            color: #fff;
            border-radius: 12px;
        }
        
        .leaflet-popup-tip {
            background: #1a1f2e;
        }
        
        .leaflet-popup-content {
            margin: 12px;
            color: #fff;
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <span>Marciano Goggia</span>
            <span class="candidate-role">Candidato à Prefeitura</span>
        </div>
        <div class="nav-links">
            <a href="index.html">Cadastro</a>
            <a href="mapa.html" class="active">Mapa</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="admin.html">Gerenciar</a>
        </div>
    </nav>

    <div id="map"></div>
    
    <div class="legend">
        <h4>Legenda</h4>
        <div class="legend-item">
            <div class="legend-icon" style="background: #4285F4;"></div>
            <span>Apoiador</span>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/alert.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
