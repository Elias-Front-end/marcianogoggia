<body>
    <div id="loading" class="loading-overlay">
        <div style="text-align:center;">
            <i data-lucide="loader-2" class="marker-pulsante" style="width: 40px; height: 40px; color: #00d4ff;"></i>
            <p style="margin-top: 15px; font-weight: 600; color: #666;">Carregando Mapa...</p>
        </div>
    </div>

    <nav class="navbar">
        <div class="logo">
            <i data-lucide="map" style="color:var(--accent-color)"></i>
            <span>Mapa <span>Inteligente</span></span>
        </div>
        <div style="display:flex; gap:15px; align-items:center;">
            <a href="index.html" class="btn-voltar">
                <i data-lucide="arrow-left" style="width:16px;"></i> Voltar
            </a>
        </div>
    </nav>

    <div id="map"></div>
    
    <div class="map-legend">
        <div class="legend-title">
            <i data-lucide="bar-chart-2" style="width:12px; height:12px;"></i>
            Densidade de Apoio
        </div>
        <div class="gradient-bar"></div>
        <div class="gradient-labels">
            <span>Baixa</span>
            <span>Média</span>
            <span>Alta</span>
        </div>
        <div class="legend-footer">
            <span id="total-text">Total: 0</span>
            <span id="max-text">Pico: 0</span>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/leaflet-heat.js"></script>
    <script src="js/alert.js"></script>
    <script>
        var map = null;
        var dados = [];
        var markers = [];
        var heatLayer = null;
        var SJP_CENTER = [-25.5317, -49.2921];

        var BAIRROS_COORDS = {
            'Academia': [-25.5189, -49.2321], 'Afonso Pena': [-25.5423, -49.2756], 'Águas Belas': [-25.5567, -49.3012],
            'Aristocrata': [-25.5298, -49.2654], 'Arujá': [-25.5489, -49.3123], 'Aviação': [-25.5084, -49.1755],
            'Barro Preto': [-25.4765, -49.2567], 'Bom Jesus': [-25.5123, -49.3234], 'Boneca do Iguaçu': [-25.5234, -49.2890],
            'Borda do Campo': [-25.4876, -49.3345], 'Braga': [-25.4534, -49.3210], 'Campo Largo da Roseira': [-25.4423, -49.3156],
            'Centro': [-25.5317, -49.2921], 'Cidade Jardim': [-25.5456, -49.2789], 'Contenda': [-25.4123, -49.3456],
            'Costeira': [-25.5567, -49.2432], 'Cruzeiro': [-25.5234, -49.2345], 'Del Rey': [-25.5345, -49.2567],
            'Dom Rodrigo': [-25.4678, -49.2890], 'Guatupê': [-25.5234, -49.2234], 'Iná': [-25.5098, -49.3123],
            'Inspetor Carvalho': [-25.4987, -49.3012], 'Ipê': [-25.5489, -49.2789], 'Itália': [-25.5378, -49.2654],
            'Jurema': [-25.5212, -49.2543], 'Ouro Fino': [-25.5567, -49.2934], 'Parque da Fonte': [-25.5623, -49.2890],
            'Pedro Moro': [-25.5156, -49.2765], 'Quississana': [-25.4876, -49.2345], 'Rio Pequeno': [-25.4987, -49.3345],
            'São Cristóvão': [-25.5156, -49.2543], 'São Domingos': [-25.5234, -49.3089], 'São Marcos': [-25.5098, -49.2234],
            'São Pedro': [-25.5567, -49.3089], 'Silveira da Motta': [-25.5423, -49.2432], 'Três Marias': [-25.4765, -49.2987],
            'Zacarias': [-25.5312, -49.2654]
        };

        async function init() {
            lucide.createIcons();
            try {
                var r = await fetch('/api/apoiadores');
                dados = await r.json();
                
                initMap();
                render();
                
                document.getElementById('loading').style.opacity = '0';
                setTimeout(() => document.getElementById('loading').style.display = 'none', 500);
            } catch(e) {
                console.error(e);
            }
        }

        function initMap() {
            var bounds = [
                [-25.75, -49.50], // Sudoeste
                [-25.35, -49.00]  // Nordeste
            ];

            map = L.map('map', { 
                zoomControl: false,
                maxBounds: bounds,
                maxBoundsViscosity: 1.0
            }).setView(SJP_CENTER, 12);
            
            // Mapa Claro (Normal)
            tileLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors',
                maxZoom: 18,
                minZoom: 11
            }).addTo(map);
            
            L.control.zoom({ position: 'bottomleft' }).addTo(map);
        }

        function render() {
            if (!map) return;
            
            markers.forEach(m => map.removeLayer(m));
            markers = [];
            
            if (heatLayer) map.removeLayer(heatLayer);
            
            var heatPoints = [];
            var bCount = {};
            dados.forEach(d => { if(d.bairro) bCount[d.bairro] = (bCount[d.bairro] || 0) + 1; });
            
            var maxEng = 0;
            Object.values(bCount).forEach(v => { if(v > maxEng) maxEng = v; });

            // 1. Calor por Bairro
            for (var b in bCount) {
                var c = BAIRROS_COORDS[b];
                if (c) {
                    var weight = 0.3 + ((bCount[b] / (maxEng || 1)) * 0.7);
                    heatPoints.push([c[0], c[1], weight]);
                }
            }

            // 2. Marcadores Verdes e Calor Individual
            dados.forEach(d => {
                var lat, lng;
                if (d.latitude && d.longitude) {
                    lat = parseFloat(d.latitude); lng = parseFloat(d.longitude);
                } else {
                    var c = BAIRROS_COORDS[d.bairro] || SJP_CENTER;
                    lat = c[0]; lng = c[1];
                }
                
                heatPoints.push([lat, lng, 1.0]);
                
                var impreciso = d.coordenadas_precisas === 0;
                var icon = L.divIcon({
                    className: 'custom-marker',
                    html: impreciso 
                        ? '<div class="marker-pulsante" style="background:#ff4444;width:32px;height:32px;border-radius:50%;border:3px solid white;box-shadow:0 4px 15px rgba(0,0,0,0.1);display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;font-weight:900;">!</div>'
                        : '<div style="background:#00ff88;width:24px;height:24px;border-radius:50%;border:3px solid white;box-shadow:0 4px 12px rgba(0,255,136,0.2);display:flex;align-items:center;justify-content:center;color:#000;font-size:12px;font-weight:bold;">✓</div>',
                    iconSize: impreciso ? [32, 32] : [24, 24],
                    iconAnchor: impreciso ? [16, 16] : [12, 12]
                });
                
                var m = L.marker([lat, lng], {icon: icon}).addTo(map);
                m.bindPopup(`
                    <div style="min-width:180px;">
                        <b style="font-size:16px;color:#1a1f2e;">${d.nome || '-'}</b><br>
                        <span style="color:#888;font-size:12px;">${d.rua || '-'}, ${d.numero || 'S/N'} - ${d.bairro || '-'}</span>
                        <div style="margin-top:10px;padding-top:10px;border-top:1px solid #eee;font-size:11px;">
                            <i data-lucide="phone" style="width:10px;display:inline-block;"></i> ${d.telefone || '-'}<br>
                            <i data-lucide="calendar" style="width:10px;display:inline-block;"></i> ${d.data_cadastro || '-'}
                        </div>
                    </div>
                `);
                m.on('popupopen', () => lucide.createIcons());
                markers.push(m);
            });

            if (heatPoints.length > 0) {
                heatLayer = L.heatLayer(heatPoints, {
                    radius: 50, blur: 25, max: 1.0,
                    gradient: { 0.2: '#ff0000', 0.5: '#ffff00', 1.0: '#00ff00' }
                }).addTo(map);
            }

            document.getElementById('total-text').textContent = 'Total: ' + dados.length;
            document.getElementById('max-text').textContent = 'Pico: ' + maxEng;
        }

        document.addEventListener('DOMContentLoaded', init);
        
        // Tema fixo Light para o Mapa
        localStorage.setItem('theme', 'light');
    </script>
</body>
</html>
