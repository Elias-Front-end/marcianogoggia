<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Apoiadores - Marciano Goggia</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <span class="candidate-name">Marciano Goggia</span>
            <span class="candidate-role">Candidato à Prefeitura</span>
        </div>
        <div class="nav-links">
            <a href="index.html">Cadastro</a>
            <a href="mapa.html" class="active">Mapa</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="admin.html">Gerenciar</a>
        </div>
    </nav>

    <div class="map-container">
        <div class="map-header">
            <h1>Mapa de Apoiadores</h1>
            <p>Visualize a distribuição geográfica dos apoiadores em São José dos Pinhais</p>
        </div>
        
        <div id="map"></div>
        
        <div class="legend" style="margin-top: 1rem; background: rgba(255,255,255,0.05); padding: 1rem; border-radius: 8px;">
            <h4 style="color: #fff; margin-bottom: 0.5rem;">Legenda</h4>
            <div class="legend-item">
                <div class="legend-icon" style="background: #00ff88;"></div>
                <span style="color: #fff;">Apoiador</span>
            </div>
            
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/alert.js"></script>
    <script src="js/script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            initMap();
        });
    </script>
</body>
</html>
