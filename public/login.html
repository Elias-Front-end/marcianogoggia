<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Marciano Goggia</title>
    <meta name="description" content="Acesso ao painel de gestão eleitoral Marciano Goggia">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0e17;
            --accent: #00d4ff;
            --accent2: #7c3aed;
            --card-bg: rgba(255,255,255,0.04);
            --card-border: rgba(255,255,255,0.08);
            --input-bg: rgba(0,0,0,0.35);
            --input-border: rgba(255,255,255,0.12);
            --text: #ffffff;
            --text-dim: rgba(255,255,255,0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
        }

        /* Animated background */
        .bg-grid {
            position: fixed; inset: 0; z-index: 0;
            background-image:
                linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
        }
        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: 50px 50px; }
        }

        .bg-glow {
            position: fixed; inset: 0; z-index: 0;
            background: radial-gradient(ellipse 60% 50% at 50% 0%, rgba(0,212,255,0.08) 0%, transparent 70%),
                        radial-gradient(ellipse 40% 40% at 80% 80%, rgba(124,58,237,0.06) 0%, transparent 60%);
        }

        /* Floating particles */
        .particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        .particle {
            position: absolute;
            width: 2px; height: 2px;
            background: var(--accent);
            border-radius: 50%;
            animation: float linear infinite;
            opacity: 0;
        }
        @keyframes float {
            0% { transform: translateY(100vh) translateX(0); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-10vh) translateX(30px); opacity: 0; }
        }

        /* Main layout */
        .login-wrapper {
            position: relative; z-index: 10;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            background: rgba(10,14,23,0.9);
            border: 1px solid var(--card-border);
            border-radius: 28px;
            padding: 2.5rem;
            box-shadow: 0 40px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(0,212,255,0.05), inset 0 1px 0 rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            animation: slideUp 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .login-logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        .login-logo .icon-wrap {
            width: 70px; height: 70px;
            margin: 0 auto 1rem;
            background: linear-gradient(135deg, rgba(0,212,255,0.15), rgba(124,58,237,0.15));
            border: 1px solid rgba(0,212,255,0.3);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem;
            box-shadow: 0 0 30px rgba(0,212,255,0.15);
        }
        .login-logo h1 {
            font-size: 1.5rem; font-weight: 800;
            background: linear-gradient(135deg, #fff 30%, #00d4ff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .login-logo p {
            font-size: 0.8rem; color: var(--text-dim); margin-top: 4px;
            text-transform: uppercase; letter-spacing: 2px;
        }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
            margin: 1.5rem 0;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }
        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 0.5rem;
        }
        .input-wrap {
            position: relative;
        }
        .input-wrap .input-icon {
            position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
            font-size: 1rem; color: var(--text-dim); pointer-events: none;
        }
        .form-group input {
            width: 100%;
            padding: 0.9rem 1rem 0.9rem 2.8rem;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 12px;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            transition: all 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(0,212,255,0.05);
            box-shadow: 0 0 0 3px rgba(0,212,255,0.1);
        }
        .form-group input::placeholder { color: rgba(255,255,255,0.2); }

        .toggle-pwd {
            position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
            background: none; border: none; cursor: pointer;
            color: var(--text-dim); font-size: 1rem;
            transition: color 0.2s;
        }
        .toggle-pwd:hover { color: var(--accent); }

        .btn-login {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            border: none; border-radius: 14px;
            color: #000; font-family: 'Inter', sans-serif;
            font-size: 0.95rem; font-weight: 800;
            text-transform: uppercase; letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
            position: relative; overflow: hidden;
            margin-top: 0.5rem;
        }
        .btn-login::before {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
            opacity: 0; transition: opacity 0.3s;
        }
        .btn-login:hover::before { opacity: 1; }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,212,255,0.35); }
        .btn-login:active { transform: translateY(0); }
        .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .error-msg {
            background: rgba(255,68,68,0.1);
            border: 1px solid rgba(255,68,68,0.3);
            border-radius: 10px;
            padding: 0.8rem 1rem;
            color: #ff6b6b;
            font-size: 0.85rem;
            margin-top: 1rem;
            display: none;
            animation: shake 0.4s ease;
        }
        .error-msg.show { display: block; }
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        .footer-text {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.2);
        }

        /* Spinner */
        .spinner {
            display: inline-block;
            width: 16px; height: 16px;
            border: 2px solid rgba(0,0,0,0.3);
            border-top-color: #000;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-glow"></div>
    <div class="particles" id="particles"></div>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-logo">
                <div class="icon-wrap">🏛️</div>
                <h1>Marciano Goggia</h1>
                <p>Painel de Gestão</p>
            </div>

            <div class="divider"></div>

            <form id="loginForm" onsubmit="fazerLogin(event)">
                <div class="form-group">
                    <label for="username">Usuário</label>
                    <div class="input-wrap">
                        <span class="input-icon">👤</span>
                        <input type="text" id="username" placeholder="Digite seu usuário" autocomplete="username" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="senha">Senha</label>
                    <div class="input-wrap">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="senha" placeholder="Digite sua senha" autocomplete="current-password" required>
                        <button type="button" class="toggle-pwd" onclick="toggleSenha()" id="toggleBtn">👁️</button>
                    </div>
                </div>

                <button type="submit" class="btn-login" id="btnLogin">Entrar</button>

                <div class="error-msg" id="errorMsg"></div>
            </form>

            <div class="footer-text">Sistema Eleitoral v2.0 · Acesso Restrito</div>
        </div>
    </div>

    <script>
        // Partículas animadas
        const particlesEl = document.getElementById('particles');
        for (let i = 0; i < 15; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDuration = (8 + Math.random() * 12) + 's';
            p.style.animationDelay = (Math.random() * 10) + 's';
            p.style.width = p.style.height = (1 + Math.random() * 2) + 'px';
            particlesEl.appendChild(p);
        }

        // Redireciona se já logado
        const tokenExistente = sessionStorage.getItem('mg_token');
        if (tokenExistente) {
            fetch('/api/auth/me', { headers: { 'Authorization': 'Bearer ' + tokenExistente } })
                .then(r => { if (r.ok) window.location.href = 'admin.html'; })
                .catch(() => {});
        }

        function toggleSenha() {
            const input = document.getElementById('senha');
            const btn = document.getElementById('toggleBtn');
            if (input.type === 'password') {
                input.type = 'text';
                btn.textContent = '🙈';
            } else {
                input.type = 'password';
                btn.textContent = '👁️';
            }
        }

        async function fazerLogin(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const senha = document.getElementById('senha').value;
            const btn = document.getElementById('btnLogin');
            const errEl = document.getElementById('errorMsg');

            errEl.classList.remove('show');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Autenticando...';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, senha })
                });
                const data = await res.json();

                if (!res.ok) throw new Error(data.error || 'Erro ao fazer login');

                sessionStorage.setItem('mg_token', data.token);
                sessionStorage.setItem('mg_usuario', JSON.stringify(data.usuario));

                btn.innerHTML = '✅ Acesso Concedido';
                btn.style.background = 'linear-gradient(135deg, #00ff88, #00cc66)';
                setTimeout(() => { window.location.href = 'admin.html'; }, 600);

            } catch (err) {
                errEl.textContent = '⚠️ ' + err.message;
                errEl.classList.add('show');
                btn.disabled = false;
                btn.innerHTML = 'Entrar';
            }
        }
    </script>
</body>
</html>
